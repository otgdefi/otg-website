<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTG GALLERY - Off The Ground</title>
    <link rel="icon" type="image/png" href="OTG.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gotg-font { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; font-style: italic; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%); }
        
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        /* 荣誉墙照片特效 */
        .photo-card { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); transition: all 0.5s; break-inside: avoid; margin-bottom: 1.5rem; }
        .photo-card:hover { transform: scale(1.03); border-color: #E60012; box-shadow: 0 10px 40px rgba(230, 0, 18, 0.25); }
        .photo-card img { width: 100%; height: auto; display: block; filter: brightness(0.8); transition: all 0.5s; }
        .photo-card:hover img { filter: brightness(1.1); }
        
        /* 顶部导航渐变掩膜 */
        .nav-mask { background: linear-gradient(to bottom, rgba(5,5,5,1) 0%, rgba(5,5,5,0.8) 60%, transparent 100%); }
        
        /* 隐藏 Elfsight 免费版可能出现的部分多余空白 */
        .elfsight-app-e78e87cf-07fe-4ece-81f5-c22c6dfa37a1 { width: 100%; }
    </style>
</head>
<body class="selection:bg-red-600">
    <canvas id="starfield"></canvas>

    <nav class="px-6 py-5 sticky top-0 z-50 text-center nav-mask flex justify-between items-center">
        <a href="index.html" class="text-gray-400 hover:text-white transition flex items-center gap-2 text-xs md:text-sm font-bold gotg-font">
            ← <span class="hidden sm:inline" id="navBack">Return to Base</span>
        </a>
        <h1 class="gotg-font text-lg md:text-2xl text-white tracking-widest absolute left-1/2 transform -translate-x-1/2">Mission Logs</h1>
        <button onclick="toggleLang()" id="langBtn" class="text-[9px] md:text-xs font-bold border border-white/20 px-2 py-1 md:px-3 md:py-1.5 rounded-md hover:bg-white/10 transition uppercase tracking-widest text-white">CN</button>
    </nav>

    <main class="max-w-6xl mx-auto py-12 px-6">
        
        <section class="mb-24">
            <div class="text-center mb-8">
                <div class="inline-block px-4 py-1 border border-red-600/50 rounded-full text-red-500 text-[10px] font-bold tracking-widest mb-4 gotg-font">Live Feed</div>
                <h2 class="text-2xl md:text-4xl font-black gotg-font mb-4" id="igTitle">Community Pulse</h2>
                <p class="text-gray-400 text-sm md:text-base max-w-2xl mx-auto" id="igDesc">
                    The latest videos and moments directly from our Instagram.
                </p>
            </div>
            
            <div class="glass-card rounded-3xl p-2 md:p-4 min-h-[400px] w-full overflow-hidden">
                <script src="https://elfsightcdn.com/platform.js" async></script>
                <div class="elfsight-app-e78e87cf-07fe-4ece-81f5-c22c6dfa37a1" data-elfsight-app-lazy></div>
            </div>

            <div class="text-center mt-8">
                <a href="https://instagram.com/otgdeficommunity" target="_blank" class="border border-red-600 bg-red-600/20 px-8 py-3.5 rounded-full font-bold text-xs text-white gotg-font hover:bg-red-600 transition inline-block" id="igBtn">
                    View on Instagram →
                </a>
            </div>
        </section>

        <section>
            <div class="text-center mb-10">
                <div class="inline-block px-4 py-1 border border-white/20 rounded-full text-gray-400 text-[10px] font-bold tracking-widest mb-4 gotg-font">Hall of Fame</div>
                <h2 class="text-xl md:text-3xl font-black gotg-font mb-4" id="galleryTitle">Genesis Archives</h2>
                <p class="text-gray-400 text-sm md:text-base max-w-2xl mx-auto" id="galleryDesc">
                    Curated high-resolution memories from landmark events.
                </p>
            </div>
            
            <div class="columns-1 sm:columns-2 lg:columns-3 gap-6" id="photo-grid">
                </div>
        </section>

    </main>

    <footer class="py-12 border-t border-white/5 text-center mt-12">
        <p class="text-gray-600 text-[9px] uppercase tracking-[0.2em]">© 2026 OTG DeFi Community. All systems functional.</p>
    </footer>

    <script>
        // 🌍 双语支持
        const i18n = {
            en: {
                lang: 'CN', navBack: 'Return to Base',
                igTitle: 'Community Pulse', igDesc: 'The latest videos and moments directly from our Instagram.', igBtn: 'View on Instagram →',
                galleryTitle: 'Genesis Archives', galleryDesc: 'Curated high-resolution memories from landmark events.'
            },
            cn: {
                lang: 'EN', navBack: '返回主页',
                igTitle: '社区脉搏', igDesc: '直接同步自 Instagram 的最新视频与精彩瞬间。', igBtn: '前往 IG 查看 →',
                galleryTitle: '创世档案', galleryDesc: '具有里程碑意义的精选高清大合照与回忆。'
            }
        };

        let currentLang = localStorage.getItem('otg_lang') || 'en';
        function updateContent() {
            const data = i18n[currentLang];
            document.getElementById('langBtn').innerText = data.lang;
            document.getElementById('navBack').innerText = data.navBack;
            document.getElementById('igTitle').innerText = data.igTitle;
            document.getElementById('igDesc').innerText = data.igDesc;
            document.getElementById('igBtn').innerText = data.igBtn;
            document.getElementById('galleryTitle').innerText = data.galleryTitle;
            document.getElementById('galleryDesc').innerText = data.galleryDesc;
        }
        function toggleLang() { currentLang = currentLang === 'en' ? 'cn' : 'en'; localStorage.setItem('otg_lang', currentLang); updateContent(); }
        updateContent();

        // 🌌 星空背景
        const canvas = document.getElementById('starfield'); const ctx = canvas.getContext('2d'); let stars = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars = []; for (let i = 0; i < 300; i++) stars.push({ x: Math.random() * canvas.width - canvas.width / 2, y: Math.random() * canvas.height - canvas.height / 2, z: Math.random() * canvas.width, o: Math.random() }); }
        function update() { ctx.clearRect(0, 0, canvas.width, canvas.height); const cx = canvas.width / 2, cy = canvas.height / 2; stars.forEach(s => { s.z -= 1.2; if (s.z <= 0) s.z = canvas.width; const sx = (s.x * (canvas.width / s.z)) + cx, sy = (s.y * (canvas.width / s.z)) + cy, size = (1 - s.z / canvas.width) * 1.5; ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`; ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI * 2); ctx.fill(); }); requestAnimationFrame(update); }
        window.addEventListener('resize', init); init(); update();

        // 🖼️ 智能图片加载逻辑 (保留底层荣誉墙功能)
        const photoCount = 6; 
        const formats = ['jpg', 'png', 'webp', 'jpeg'];
        const grid = document.getElementById('photo-grid');

        function tryLoadImage(index) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            const img = document.createElement('img');
            img.alt = `OTG Archive ${index}`;
            img.setAttribute('data-index', index);
            img.setAttribute('data-format-index', '0');
            img.src = `gallery/${index}.${formats[0]}`;
            
            img.onerror = function() {
                let fIndex = parseInt(this.getAttribute('data-format-index')) + 1;
                if (fIndex < formats.length) {
                    this.setAttribute('data-format-index', fIndex);
                    this.src = `gallery/${index}.${formats[fIndex]}`;
                } else {
                    card.style.display = 'none';
                }
            };
            card.appendChild(img);
            grid.appendChild(card);
        }

        for (let i = 1; i <= photoCount; i++) { tryLoadImage(i); }
    </script>
</body>
</html>
