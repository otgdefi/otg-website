<!DOCTYPE html>
<html lang="zh">
<head>

    <title>OTG - Off The Ground | Web3 Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0A0A0A; color: white; margin: 0; font-family: sans-serif; }
        .glow-red { box-shadow: 0 0 30px rgba(230, 0, 18, 0.3); }
    </style>
</head>
<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.03);

    }
    .glass-card:hover {
        border-color: #E60012;
        transform: translateY(-5px);

</style>

        <div class="glass-card p-8 rounded-3xl">
            <h3 class="text-red-500 font-bold mb-2 uppercase">DeFi</h3>
            <p class="text-sm text-gray-400">Yield farming, protocols & liquidity strategies.</p>
        </div>
        <div class="glass-card p-8 rounded-3xl">
            <h3 class="text-red-500 font-bold mb-2 uppercase">Airdrop</h3>
