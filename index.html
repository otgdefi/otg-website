<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">

    <title>OTG - Off The Ground | Web3 Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0A0A0A; color: white; margin: 0; font-family: sans-serif; }

        <div class="flex gap-4">

        </div>
    </section>

    <footer class="py-20 border-t border-white/10 text-center">
        <p class="text-gray-500 text-sm">© 2026 OTG (Off The Ground) DeFi Community.</p>
    </footer>

</html>
