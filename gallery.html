<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTG GALLERY - Off The Ground</title>
    <link rel="icon" type="image/png" href="OTG.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gotg-font { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 0.1em; font-style: italic; }
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%); }
        
        .photo-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }
        .photo-card:hover {
            transform: scale(1.03);
            border-color: #E60012;
            box-shadow: 0 10px 40px rgba(230, 0, 18, 0.25);
        }
        .photo-card img {
            width: 100%;
            height: auto;
            display: block;
            filter: brightness(0.8);
            transition: all 0.5s;
        }
        .photo-card:hover img { filter: brightness(1.1); }
        
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <nav class="p-6 border-b border-white/10 bg-[#0A0A0A]/90 backdrop-blur-md sticky top-0 z-50 text-center">
        <h1 class="gotg-font text-xl md:text-2xl text-white">Mission Logs: Gallery</h1>
    </nav>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="mb-12 text-center">
            <div class="inline-block px-4 py-1 border border-red-600/50 rounded-full text-red-500 text-[10px] font-bold tracking-widest mb-4 gotg-font">Offline Archives</div>
            <p class="text-gray-400 text-sm md:text-base max-w-2xl mx-auto" id="galleryDesc">
                Relive the moments from our offline meetups and Web3 festivals.
            </p>
        </div>

        <div class="columns-1 sm:columns-2 lg:columns-3 gap-6" id="photo-grid">
            </div>
    </main>

    <div class="back-btn">
        <a href="index.html" class="bg-white/10 backdrop-blur-md border border-white/20 px-8 py-3 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-red-600 transition duration-300 gotg-font text-white">
            ← Return to Base
        </a>
    </div>

    <script>
        // 🌌 星空背景
        const canvas = document.getElementById('starfield'); const ctx = canvas.getContext('2d'); let stars = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; stars = []; for (let i = 0; i < 300; i++) stars.push({ x: Math.random() * canvas.width - canvas.width / 2, y: Math.random() * canvas.height - canvas.height / 2, z: Math.random() * canvas.width, o: Math.random() }); }
        function update() { ctx.clearRect(0, 0, canvas.width, canvas.height); const cx = canvas.width / 2, cy = canvas.height / 2; stars.forEach(s => { s.z -= 1.2; if (s.z <= 0) s.z = canvas.width; const sx = (s.x * (canvas.width / s.z)) + cx, sy = (s.y * (canvas.width / s.z)) + cy, size = (1 - s.z / canvas.width) * 1.5; ctx.fillStyle = `rgba(255, 255, 255, ${s.o})`; ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI * 2); ctx.fill(); }); requestAnimationFrame(update); }
        window.addEventListener('resize', init); init(); update();

        // 🖼️ 智能图片加载逻辑 (多格式兼容)
        const photoCount = 12; // 如果图片多，就把这个数字改大
        const formats = ['jpg', 'png', 'webp', 'jpeg', 'JPG', 'PNG'];
        const grid = document.getElementById('photo-grid');

        function tryLoadImage(index) {
            const card = document.createElement('div');
            card.className = 'photo-card';
            
            const img = document.createElement('img');
            img.alt = `OTG Event ${index}`;
            img.setAttribute('data-index', index);
            img.setAttribute('data-format-index', '0');
            
            // 初始尝试加载 jpg
            img.src = `gallery/${index}.${formats[0]}`;
            
            img.onerror = function() {
                let fIndex = parseInt(this.getAttribute('data-format-index')) + 1;
                if (fIndex < formats.length) {
                    this.setAttribute('data-format-index', fIndex);
                    this.src = `gallery/${index}.${formats[fIndex]}`;
                } else {
                    // 如果所有格式都报错，隐藏这张卡片，不显示破碎图
                    card.style.display = 'none';
                }
            };

            card.appendChild(img);
            grid.appendChild(card);
        }

        for (let i = 1; i <= photoCount; i++) {
            tryLoadImage(i);
        }

        // 双语文案支持
        const langDesc = {
            en: "Relive the moments from our offline meetups, Web3 festivals, and afterparties.",
            cn: "重温我们的线下见面会、Web3 音乐节和社区派对的精彩瞬间。"
        };
        const currentLang = localStorage.getItem('otg_lang') || 'en';
        document.getElementById('galleryDesc').innerText = langDesc[currentLang];
    </script>
</body>
</html>
